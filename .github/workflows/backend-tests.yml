name: Backend tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: jidoka
          POSTGRES_PASSWORD: jidoka
          POSTGRES_DB: jidoka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jidoka -d jidoka"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest -v
