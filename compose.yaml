services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: jidoka
      POSTGRES_PASSWORD: jidoka
      POSTGRES_DB: jidoka
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jidoka -d jidoka"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    # dev override: auto-reload on files synced by `docker compose watch`
    # (the image's CMD uses `fastapi run` for production)
    command: ["fastapi", "dev", "main.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://jidoka:jidoka@db:5432/jidoka
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: ./backend/uv.lock

volumes:
  pgdata:
